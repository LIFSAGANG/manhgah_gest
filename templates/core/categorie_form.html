{% extends 'core/base.html' %}
{% block content %}
  <style>
    .cat-form-head { background: linear-gradient(90deg, #0f2f59 0%, #1e4f86 100%); color: #fff; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
    .cat-form-head p { color: #dbeafe !important; }
  </style>
  <div class="standalone-page">
    <div class="standalone-surface">
      <div class="standalone-head cat-form-head">
        <div>
          <h2 class="h4 mb-1">{{ title }}</h2>
          <p class="text-muted mb-0">Gestion des catégories produits.</p>
        </div>
        <div class="standalone-tools">

        </div>
      </div>

      <div class="form-shell">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              {{ field.label_tag }}
              {{ field }}
              {% if field.errors %}
                <div class="invalid-feedback d-block">{{ field.errors }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <div class="mt-3">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="{% url 'categorie_list' %}{% if request.GET.standalone == '1' %}?standalone=1{% endif %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.form-shell input, .form-shell select, .form-shell textarea').forEach(function (el) {
        if (el.type === 'checkbox') {
          el.classList.add('form-check-input');
        } else {
          el.classList.add('form-control');
        }
      });
    });
  </script>
{% endblock %}
