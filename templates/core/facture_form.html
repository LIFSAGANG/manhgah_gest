{% extends 'core/base.html' %}
{% block content %}
  <div class="standalone-page">
    <div class="standalone-surface">
      <div class="standalone-head">
        <div>
          <h2 class="h4 mb-1">{{ title }}</h2>
          <p class="text-muted mb-0">Renseignez les informations de la facture.</p>
        </div>
        <div class="standalone-tools">

        </div>
      </div>

      <div class="form-shell">
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Référence</label>
              {{ form.reference }}
            </div>
            <div class="col-md-6">
              <label class="form-label">Client</label>
              {{ form.client }}
            </div>
            <div class="col-md-6">
              <label class="form-label">Date d’émission</label>
              {{ form.date_emission }}
            </div>
            <div class="col-md-6">
              <label class="form-label">Montant total</label>
              {{ form.montant_total }}
            </div>
            <div class="col-md-6">
              <label class="form-label">Statut</label>
              {{ form.statut }}
            </div>
            <div class="col-12">
              <label class="form-label">Notes</label>
              {{ form.notes }}
            </div>
          </div>
          <div class="mt-4">
            <button type="submit" class="btn btn-success">Enregistrer</button>
            <a href="{% url 'facture_list' %}{% if request.GET.standalone == '1' %}?standalone=1{% endif %}" class="btn btn-secondary ms-2">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
