{% extends 'core/base.html' %}
{% block content %}
  <div class="standalone-page">
    <div class="confirm-shell">
      <h2 class="h5 mb-3">Supprimer le projet</h2>
      <p>Êtes-vous sûr de vouloir supprimer ce projet : <strong>{{ projet.nom }}</strong> ?</p>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'projet_list' %}{% if request.GET.standalone == '1' or request.GET.embed == '1' %}?{% if request.GET.standalone == '1' %}standalone=1{% endif %}{% if request.GET.embed == '1' %}{% if request.GET.standalone == '1' %}&{% endif %}embed=1{% endif %}{% if request.GET.from_parametres == '1' %}&from_parametres=1{% endif %}{% if request.GET.societe %}&societe={{ request.GET.societe }}{% endif %}{% endif %}" class="btn btn-outline-secondary">Annuler</a>
      </form>
    </div>
  </div>
{% endblock %}
