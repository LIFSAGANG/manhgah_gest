{% extends 'core/base.html' %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">Supprimer la société</h2>
          <p>Voulez-vous vraiment supprimer la société <strong>{{ societe.nom }}</strong> ?</p>
          <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
            <a href="{% url 'societe_list' %}" class="btn btn-secondary ms-2">Annuler</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
