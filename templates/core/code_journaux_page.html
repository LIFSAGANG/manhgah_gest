{% extends 'core/base.html' %}
{% block content %}
  <div class="standalone-page">
    <div class="standalone-surface">
      <div class="standalone-head">
        <div>
          <h2>Code journaux</h2>
          <p class="text-muted mb-0">Codes et libelles des journaux</p>
        </div>
        <div class="standalone-tools">
          <a href="{% url 'comptabilite_page' %}{% if request.GET.standalone == '1' %}?standalone=1{% endif %}" class="btn btn-secondary">Retour</a>
        </div>
      </div>

      <div class="standalone-table-card">
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle">
            <thead>
              <tr>
                <th>Code</th>
                <th>Nom</th>
                <th>Societe</th>
              </tr>
            </thead>
            <tbody>
              {% for journal in journaux %}
                <tr>
                  <td>{{ journal.code }}</td>
                  <td>{{ journal.nom }}</td>
                  <td>{{ journal.societe.nom }}</td>
                </tr>
              {% empty %}
                <tr>
                  <td colspan="3" class="empty-state">Aucun journal disponible.</td>
                </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
