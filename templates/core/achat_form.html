{% extends 'core/base.html' %}
{% block content %}
  <div class="container mt-4">
    <h2>{{ title }}</h2>
    <form method="post" class="mt-4">
      {% csrf_token %}
      <div class="card">
        <div class="card-body">
          {% for field in form %}
            <div class="mb-3">
              {{ field.label_tag }}
              {{ field }}
              {% if field.errors %}
                <div class="invalid-feedback d-block">{{ field.errors }}</div>
              {% endif %}
            </div>
          {% endfor %}
        </div>
      </div>
      <div class="mt-3">
        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'achat_list' %}" class="btn btn-outline-secondary">Annuler</a>
      </div>
    </form>
  </div>
{% endblock %}
