{% extends 'core/base.html' %}
{% block content %}
  <div class="standalone-page">
    <div class="standalone-surface">
      <div class="standalone-head">
        <div>
          <h2 class="h4 mb-1">{{ title }}</h2>
          <p class="text-muted mb-0">Enregistrez les entrées, sorties ou transferts de stock.</p>
        </div>
        <div class="standalone-tools">

        </div>
      </div>

      <div class="form-shell">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              {{ field.label_tag }}
              {{ field }}
              {% if field.errors %}
                <div class="invalid-feedback d-block">{{ field.errors }}</div>
              {% endif %}
            </div>
          {% endfor %}
          <div class="mt-3">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="{% url 'mouvement_list' %}{% if request.GET.standalone == '1' %}?standalone=1{% endif %}" class="btn btn-outline-secondary">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
