{% extends 'core/base.html' %}
{% block content %}
  <div class="standalone-page">
    <div class="confirm-shell">
      <h4 class="mb-2">Confirmer la suppression</h4>
      <p class="text-muted">Êtes-vous sûr de vouloir supprimer ce mouvement de stock ?</p>
      <form method="post" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'mouvement_list' %}{% if request.GET.standalone == '1' %}?standalone=1{% endif %}" class="btn btn-outline-secondary">Annuler</a>
      </form>
    </div>
  </div>
{% endblock %}
