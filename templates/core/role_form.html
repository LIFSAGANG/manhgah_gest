{% extends 'core/base.html' %}
{% block content %}
  <div class="standalone-page">
    <div class="standalone-surface">
      <div class="standalone-head">
        <div>
          <h2 class="h4 mb-1">{{ title }}</h2>
          <p class="text-muted mb-0">Renseignez les informations du rôle.</p>
        </div>
      </div>

      <div class="form-shell">
        <form method="post" action="{{ request.get_full_path }}">
          {% csrf_token %}
          <div class="row g-3">
            {% for field in form %}
              <div class="col-md-6">
                <label class="form-label fw-semibold">
                  {{ field.label }}
                  {% if field.field.required %}<span class="text-danger">*</span>{% endif %}
                </label>
                {{ field }}
                {% if field.errors %}
                  <div class="invalid-feedback d-block">{{ field.errors }}</div>
                {% endif %}
              </div>
            {% endfor %}
          </div>
          <div class="mt-4">
            <button type="submit" class="btn btn-success">Enregistrer</button>
            <a href="{% url 'role_list' %}{% if request.GET.standalone == '1' %}?standalone=1{% endif %}" class="btn btn-secondary ms-2">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
