{% extends 'core/base.html' %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row mb-4">
    <div class="col-12">
      <h2 class="h4 mb-3">Permissions du rôle: <strong>{{ role.nom }}</strong></h2>
      <p class="text-muted">{{ role.description }}</p>
    </div>
  </div>

  <form method="post" class="needs-validation">
    {% csrf_token %}
    <div class="row">
      {% for module, perms in permissions_by_module.items %}
      <div class="col-lg-6 mb-4">
        <div class="card shadow-sm">
          <div class="card-header bg-info text-white">
            <h5 class="mb-0">
              <i class="fas fa-lock-open"></i> {{ module }}
            </h5>
          </div>
          <div class="card-body">
            <div class="permission-list">
              {% for perm in perms %}
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="permissions" 
                       value="{{ perm.id }}" id="perm_{{ perm.id }}"
                       {% if perm.checked %}checked{% endif %}>
                <label class="form-check-label" for="perm_{{ perm.id }}">
                  <strong>{{ perm.nom }}</strong>
                  {% if perm.description %}
                  <br>
                  <small class="text-muted">{{ perm.description }}</small>
                  {% endif %}
                </label>
              </div>
              {% endfor %}
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>

    <div class="row mt-4">
      <div class="col-12">
        <button type="submit" class="btn btn-success btn-lg">
          <i class="fas fa-save"></i> Enregistrer les permissions
        </button>
        <a href="{% url 'role_list' %}" class="btn btn-secondary btn-lg ms-2">
          <i class="fas fa-arrow-left"></i> Retour
        </a>
      </div>
    </div>
  </form>
</div>

<style>
  .permission-list {
    max-height: 500px;
    overflow-y: auto;
  }
</style>
{% endblock %}
