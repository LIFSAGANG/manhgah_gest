{% extends 'core/base.html' %}
{% block content %}
  <style>
    .cat-confirm-title { color: #991b1b; font-weight: 800; }
  </style>
  <div class="standalone-page">
    <div class="confirm-shell">
      <h4 class="mb-2 cat-confirm-title">Confirmer la suppression</h4>
      <p class="text-muted">Êtes-vous sûr de vouloir supprimer cette catégorie : <strong>{{ categorie.nom }}</strong> ?</p>
      <form method="post" class="mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'categorie_list' %}{% if request.GET.standalone == '1' %}?standalone=1{% endif %}" class="btn btn-outline-secondary">Annuler</a>
      </form>
    </div>
  </div>
{% endblock %}
